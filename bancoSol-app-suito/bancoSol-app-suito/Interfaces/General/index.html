<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestionar coordinadores</title>
  <link rel="stylesheet" href="../global.css" />
  <link rel="stylesheet" href="styles.css" />
  <script src="general.js" defer></script>
</head>
<body>
  <main class="coordinadores">
    <section class="panel-coordinadores" aria-label="Gestión de coordinadores">
      <header class="panel-coordinadores__header">
        <div class="usuario">
          <div class="usuario__logo">
            <img src="../assets/logo.png" alt="Logo" />
          </div>

          <div class="usuario__datos">
            <p class="usuario__bienvenida">Bienvenido, Nombre apellidos</p>
            <p class="usuario__rol">Administrador</p>
          </div>
        </div>

        <a href="#" class="panel-coordinadores__logout">Cerrar sesión</a>
      </header>

      <div class="panel-coordinadores__body">
        <div class="iframe-contenedor iframe-menu">
          <iframe class="menu-lateral-iframe" src="../MenuLateral/menu-lateral.html" title="Menú lateral de administración"></iframe>
        </div>

        <div class="iframe-contenedor iframe-contenido">
          <iframe class="contenido-iframe" src="../GestionarCoordinadores/coordinadores.html" title="Contenido dinámico"></iframe>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
