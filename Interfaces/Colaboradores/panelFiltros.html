<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../global.css">
    <link rel="stylesheet" href="colaboradorSeleccionado.css">
    <script src="panelFiltros.js" defer></script>
    <style>
        /* 1. Aseguramos que el contenedor no tenga scroll horizontal */
    .panel-contenido { 
        overflow-x: hidden; 
        padding: 15px;
        box-sizing: border-box; /* Crucial para que el padding no sume al ancho */
    }
    
    /* 2. Ajustamos la fila de los checkboxes */
    .fila-check { 
        display: flex; 
        align-items: flex-start; /* Alinea el checkbox con la primera línea de texto */
        gap: 12px; 
        margin-bottom: 20px; 
        cursor: pointer;
        width: 100%;
    }

    /* 3. Estilo del texto del checkbox */
    .fila-check .etiqueta {
        flex: 1; /* Ocupa el espacio restante */
        white-space: normal; /* PERMITE que el texto salte de línea si es necesario */
        line-height: 1.2;
        color: #334155;
        font-size: 14px;
        word-wrap: break-word; /* Rompe palabras si son excesivamente largas */
    }

    /* 4. Tamaño fijo para el checkbox para que no se deforme */
    .check-inline {
        width: 18px;
        height: 18px;
        flex-shrink: 0; /* Evita que el checkbox se haga pequeño si hay mucho texto */
        margin-top: 2px;
        cursor: pointer;
    }

    /* 5. Selectores más limpios */
    select.input-linea {
        width: 100%;
        padding: 8px;
        border: 1px solid #cbd5e1;
        border-radius: 4px;
        background-color: white;
        margin-bottom: 10px;
    }
    </style>
</head>
<body>
    <aside class="panel-colaborador">
        <header class="panel-cabecera">
            <div style="flex: 1;">
                <h2 style="font-size: 18px; color: #2e1065;">Filtros de búsqueda</h2>
                <span class="badge-id">Ajuste de resultados</span>
            </div>
            <button id="btn-cerrar-filtros" class="btn-cerrar" type="button">←</button>
        </header>

        <div class="panel-contenido">
            <section class="bloque-seccion border-bottom">
                <div class="fila-flex">
                    <span class="etiqueta">Tienda:</span>
                    <input type="text" id="filtro-tienda" class="input-linea" placeholder="Escribe nombre de tienda...">
                </div>
                
                <div class="fila-flex">
                    <span class="etiqueta">Localidad:</span>
                    <select id="filtro-localidad" class="input-linea">
                        <option value="">Todas las localidades</option>
                    </select>
                </div>

                <div class="fila-flex">
                    <span class="etiqueta">Campaña:</span>
                    <select id="filtro-campania" class="input-linea">
                        <option value="">Todas las campañas</option>
                    </select>
                </div>
            </section>

            <section class="bloque-seccion border-bottom">
                <label class="fila-check">
                    <input type="checkbox" id="filtro-capital" class="check-inline">
                    <span class="etiqueta">Solo en Capital</span>
                </label>

                <label class="fila-check">
                    <input type="checkbox" id="filtro-activa" class="check-inline">
                    <span class="etiqueta">Colaborador Activo</span>
                </label>
            </section>

            <section class="bloque-seccion">
                <button id="btn-aplicar-filtros" class="btn-guardar-lateral" style="background-color: #1e3a8a;">Aplicar Filtros</button>
                <button id="btn-limpiar-filtros" class="btn-limpiar" style="margin-top: 10px; width: 100%; padding: 10px; cursor: pointer; border: 1px solid #ccc; background: none; border-radius: 4px;">Limpiar todos los filtros</button>
            </section>
        </div>
    </aside>
</body>
</html>
