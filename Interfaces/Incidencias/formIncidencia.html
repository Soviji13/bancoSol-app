<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Nueva incidencia</title>

  <link rel="stylesheet" href="../global.css" />
  <link rel="stylesheet" href="formIncidencia.css" />

  <script src="formIncidencia.js" defer></script>
</head>

<body>
  <main class="pagina-formulario" aria-labelledby="titulo-formulario">
    <header class="pagina-formulario__header">
      <div>
        <h1 id="titulo-formulario">Nueva incidencia</h1>
        <p>Registre una incidencia asociada a un responsable de tienda o de entidad.</p>
      </div>

      <button id="btn-volver" class="btn-volver" type="button">
        Volver
      </button>
    </header>

    <section class="tarjeta-formulario">
      <form id="form-incidencia">
        <input type="hidden" id="incidencia-id" name="id" />

        <fieldset>
          <legend>Información de la incidencia</legend>

          <div class="form-row">
            <div class="form-group">
              <label for="asunto">Asunto:</label>
              <input
                id="asunto"
                name="asunto"
                type="text"
                required
                maxlength="120"
                placeholder="Ej: Falta material en el punto de recogida"
              />
            </div>

            <div class="form-group">
              <label for="estado">Estado:</label>
              <select id="estado" name="estado" required>
                <option value="PENDIENTE">Pendiente</option>
                <option value="LEIDA">Leída</option>
                <option value="RESUELTA">Resuelta</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label for="descripcion">Descripción:</label>
            <textarea
              id="descripcion"
              name="descripcion"
              rows="6"
              placeholder="Describa la incidencia con el mayor detalle posible..."
            ></textarea>
          </div>
        </fieldset>

        <fieldset>
          <legend>Responsable asociado</legend>

          <div class="form-row">
            <div class="form-group">
              <label for="tipo-responsable">Tipo de responsable:</label>
              <select id="tipo-responsable" name="tipoResponsable" required>
                <option value="">Seleccione un tipo...</option>
                <option value="RESPONSABLE_TIENDA">Responsable de tienda</option>
                <option value="RESPONSABLE_ENTIDAD">Responsable de entidad</option>
              </select>
            </div>

            <div class="form-group">
              <label for="responsable-id">Responsable:</label>
              <select id="responsable-id" name="responsableId" required disabled>
                <option value="">Seleccione primero un tipo...</option>
              </select>
            </div>
          </div>
        </fieldset>

        <footer class="formulario-acciones">
          <button id="btn-cancelar" class="btn-cancelar" type="button">
            Cancelar
          </button>

          <button id="btn-guardar" class="btn-guardar" type="submit">
            Guardar incidencia
          </button>
        </footer>
      </form>
    </section>
  </main>
</body>
</html>
