<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Gestionar incidencias</title>

  <link rel="stylesheet" href="../global.css" />
  <link rel="stylesheet" href="incidencias.css" />

  <script src="incidencias.js" type="module" defer></script>
</head>

<body>
  <section class="contenido" aria-labelledby="titulo-campania">

    <header class="contenido__topbar">
      <div class="filtro">
        <button
          id="btn-filtro"
          class="boton-icono"
          type="button"
          aria-label="Filtrar incidencias"
        >
          <img src="../assets/embudo.png" alt="" />
          <span id="contador-filtros" class="boton-icono__contador" hidden>0</span>
        </button>
      </div>

      <div class="historial-incidencias">
        <h1 id="titulo-campania" class="historial_titulo">
          Incidencias
        </h1>
      </div>

      <div class="seccion-ayuda">
        <p class="contenido__ayuda">
          Para ver más información sobre una incidencia, haga doble clic sobre su fila correspondiente.
        </p>

        <button
          id="btn-ayuda"
          class="boton-ayuda"
          type="button"
          aria-label="Ayuda"
        >
          ?
        </button>
      </div>
    </header>

    <div
      id="mensaje-incidencias"
      class="mensaje-incidencias"
      aria-live="polite"
    ></div>

    <main class="tabla-contenedor">
      <table class="tabla-incidencias">
        <thead>
          <tr>
            <th scope="col">ID</th>
            <th scope="col">Reportado por</th>
            <th scope="col">Tipo responsable</th>
            <th scope="col">Hora</th>
            <th scope="col">Fecha</th>
            <th scope="col">Asunto</th>
            <th scope="col">Estado</th>
          </tr>
        </thead>

        <tbody id="tabla-incidencias-body">
          <!-- Las incidencias se cargan desde incidencias.js -->
        </tbody>
      </table>
    </main>

    <footer id="acciones-tabla" class="acciones-tabla">
      <button
        id="btn-anadir"
        class="acciones-tabla__btn"
        type="button"
      >
        Añadir nueva incidencia
      </button>

      <button
        id="btn-confirmar-lectura"
        class="acciones-tabla__btn"
        type="button"
      >
        Confirmar lectura
      </button>

      <button
        id="btn-confirmar-resolucion"
        class="acciones-tabla__btn"
        type="button"
      >
        Confirmar resolución
      </button>
    </footer>

  </section>
</body>
</html>
