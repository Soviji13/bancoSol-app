<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestionar coordinadores</title>
  <link rel="stylesheet" href="../global.css" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="contenido.css" />
  <script src="script.js" defer></script>
</head>
<body>
  <main class="coordinadores">
    <section class="panel-coordinadores" aria-label="Gestión de coordinadores">
      <header class="panel-coordinadores__header">
        <div class="usuario">
          <div class="usuario__logo">
            <img src="../assets/logo.png" alt="Logo" />
          </div>

          <div class="usuario__datos">
            <p class="usuario__bienvenida">Bienvenido, Nombre apellidos</p>
            <p class="usuario__rol">Administrador</p>
          </div>
        </div>

        <a href="#" class="panel-coordinadores__logout">Cerrar sesión</a>
      </header>

      <div class="panel-coordinadores__body">
        <nav class="menu-lateral" aria-label="Menú de administración">
          <button class="menu-lateral__btn" type="button">Gestionar campañas</button>
          <button class="menu-lateral__btn menu-lateral__btn--activo" type="button">
            Gestionar coordinadores
          </button>
          <button class="menu-lateral__btn" type="button">Gestionar tiendas</button>
          <button class="menu-lateral__btn" type="button">Gestionar colaboradores</button>
          <button class="menu-lateral__btn" type="button">Gestionar voluntarios</button>
          <button class="menu-lateral__btn" type="button">Incidencias y movimientos</button>
        </nav>

        <iframe class="contenido" src="contenido.html" title="Contenido dinámico"></iframe>
      </div>
    </section>
  </main>
</body>
</html>
