<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Añadir Tienda</title>
  <link rel="stylesheet" href="../global.css" />
  <link rel="stylesheet" href="aniadir-tienda.css" />
  <script src="aniadir-tienda.js" defer></script>
</head>
<body>
  <section class="contenido">
    <header class="cabecera-anadir">
      <p class="texto-instruccion">Rellene los datos de la tienda para añadir una nueva tienda:</p>
    </header>

    <div class="formulario-contenedor">
      <form id="form-anadir" class="form-tienda">
        
        <div class="form-fila">
          <label>¿Ha participado en campañas anteriores?:</label>
          <div class="radio-grupo">
            <input type="radio" id="participado-si" name="participadoAnterior" value="si">
            <label for="participado-si">Sí</label>
            
            <input type="radio" id="participado-no" name="participadoAnterior" value="no" checked>
            <label for="participado-no">No</label>
          </div>
        </div>

        <div class="form-fila oculto" id="bloque-campania-origen">
          <label>Campaña de origen:</label>
          <div style="display: flex; align-items: center; gap: 0.5rem;">
            <button type="button" id="btn-seleccionar-origen" class="btn-nuevo-inline" style="padding: 0.4rem 0.8rem; background: var(--color-principal); color: white; border-radius: var(--radio-sm); font-weight: bold; border:none; cursor:pointer;">Seleccionar campaña</button>
            <span id="texto-campania-origen" style="font-weight: 500; color: var(--color-principal);">Ninguna seleccionada</span>
          </div>
        </div>

        <div class="form-fila oculto" id="bloque-tienda-existente">
          <label for="select-tienda-existente">Elija la tienda que desea añadir:</label>
          <select id="select-tienda-existente" class="select-caja">
            <option value="" disabled selected>Seleccione una campaña primero...</option>
          </select>
        </div>

        <div class="form-fila">
          <label for="select-campania-destino">Asociar a la Campaña:</label>
          <select id="select-campania-destino" class="select-caja" required>
            <option value="" disabled selected>Cargando campañas...</option>
          </select>
        </div>

        <hr style="border: none; border-top: 1px solid var(--color-borde-suave); margin: 0.5rem 0;">

        <div class="form-fila">
          <label for="select-cadena">Cadena:</label>
          <select id="select-cadena" class="select-caja" required>
            <option value="" disabled selected>Cargando cadenas...</option>
          </select>
        </div>

        <div class="form-fila">
          <label for="input-nombre">Nombre:</label>
          <input type="text" id="input-nombre" class="input-linea" required>
        </div>

        <div class="form-fila">
          <label>¿Pertenece a una franquicia?:</label>
          <div class="radio-grupo">
            <input type="radio" id="franq-si" name="franquicia" value="si">
            <label for="franq-si">Sí</label>
            
            <input type="radio" id="franq-no" name="franquicia" value="no" checked required>
            <label for="franq-no">No</label>
          </div>
        </div>

        <div class="form-fila">
          <label for="select-localidad">Localidad:</label>
          <select id="select-localidad" class="select-caja" required>
            <option value="" disabled selected>Cargando localidades...</option>
          </select>
        </div>

        <div class="form-fila oculto" id="bloque-distrito">
          <label for="select-distrito">Distrito:</label>
          <select id="select-distrito" class="select-caja">
            <option value="" disabled selected>Cargando distritos...</option>
          </select>
        </div>

        <div class="form-fila">
          <label for="select-cp">Código postal:</label>
          <select id="select-cp" class="select-caja" required>
            <option value="" disabled selected>Cargando CPs...</option>
          </select>
        </div>

        <div class="form-fila">
          <label>Zona Geográfica:</label>
          <span id="texto-zona" style="color: var(--color-texto-secundario); font-weight: 500;">---</span>
        </div>

        <div class="form-fila">
          <label for="input-calle">Calle:</label>
          <input type="text" id="input-calle" class="input-linea" placeholder="Nombre de la vía, p.e.: Calle de la Bola" required>
        </div>

        <div class="form-fila">
          <label for="input-numero">Nº:</label>
          <input type="number" id="input-numero" class="input-linea" style="max-width: 100px;" required>
        </div>

        <div class="form-fila">
          <label for="select-responsable">Responsable Tienda:</label>
          <div style="display: flex; align-items: center; width: 100%; gap: 0.5rem;">
            <select id="select-responsable" class="select-caja" required>
              <option value="" disabled selected>Cargando responsables...</option>
            </select>
            <button type="button" id="btn-abrir-modal-resp" class="btn-nuevo-inline" style="padding: 0.4rem 0.8rem; background: var(--color-principal); color: white; border-radius: var(--radio-sm); font-weight: bold; border:none; cursor:pointer;">+ Nuevo</button>
          </div>
        </div>

        <div id="modal-nuevo-responsable" class="modal-overlay oculto">
          <div class="modal-caja">
            <header class="modal-cabecera">
              <h3>Nuevo Encargado de Tienda</h3>
              <button type="button" id="btn-cerrar-modal" class="modal-cerrar-x">X</button>
            </header>
            <div class="modal-cuerpo">
              <div class="modal-campo">
                <label>Nombre Completo:</label>
                <input type="text" id="modal-nombre" placeholder="Ej. Juan Pérez">
              </div>
              <div class="modal-campo">
                <label>Email Corporativo:</label>
                <input type="email" id="modal-email" placeholder="ejemplo@bancosol.com">
              </div>
              <div class="modal-campo">
                <label>Teléfono Móvil:</label>
                <input type="text" id="modal-telefono" placeholder="600111222">
              </div>
              <div class="modal-campo">
                <label>Contraseña Acceso:</label>
                <input type="password" id="modal-password">
              </div>
            </div>
            <footer class="modal-pie">
              <button type="button" id="btn-guardar-responsable" class="btn-modal-guardar">Guardar Responsable</button>
            </footer>
          </div>
        </div>

      </form>
    </div>

    <div id="modal-campanias" class="modal-overlay oculto">
      <div class="modal-caja" style="max-width: 450px;">
        <header class="modal-cabecera">
          <h3 style="margin:0; font-size:1.2rem;">Seleccionar Campaña de Origen</h3>
          <button type="button" id="btn-cerrar-campanias" class="modal-cerrar-x">X</button>
        </header>
        <div class="modal-cuerpo" id="lista-campanias" style="max-height: 55vh; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem; padding: 1rem 0 0 0;">
        </div>
      </div>
    </div>

    <div class="acciones-tabla">
      <button type="button" id="btn-cancelar" class="acciones-tabla__btn btn-cancelar">Cancelar</button>
      <button type="button" id="btn-anadir" class="acciones-tabla__btn btn-anadir">Añadir</button>
    </div>
  </section>
</body>
</html>
